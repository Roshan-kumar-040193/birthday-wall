<!DOCTYPE html>
<html>
<head>
<title>Richa's Birthday Wall ✨</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Caveat&family=Indie+Flower&family=Patrick+Hand&family=Shadows+Into+Light&family=Gloria+Hallelujah&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#f3efe8;
overflow-x:hidden;
}

/* Header Container to hold title and countdown */
.header-container {
text-align: center;
margin: 40px 0 20px 0;
}

.title{
font-family:'Playfair Display', serif;
font-size:48px;
margin: 0 0 15px 0;
color: #2c2c2c;
}

/* Aesthetic Countdown Styles */
.countdown-container {
display: inline-flex;
gap: 20px;
font-family: 'Patrick Hand', cursive;
background: rgba(255, 255, 255, 0.6);
padding: 10px 25px;
border-radius: 30px;
box-shadow: 0 4px 15px rgba(0,0,0,0.05);
backdrop-filter: blur(4px);
}

.countdown-item {
display: flex;
flex-direction: column;
align-items: center;
min-width: 50px;
}

.countdown-number {
font-size: 28px;
font-weight: bold;
color: #c89f7b; /* Matches your 'Pin Memory' button color */
line-height: 1;
}

.countdown-label {
font-size: 14px;
color: #71717a;
text-transform: uppercase;
letter-spacing: 1px;
margin-top: 4px;
}

#wall{
position:relative;
width:100%;
min-height:2500px;
}

.note{
position:absolute;
width:230px;
padding:10px 10px 35px;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,.18);
border-radius:4px;
transition:.35s;
}

.note:hover{
transform:scale(1.08) rotate(0deg)!important;
z-index:10;
box-shadow:0 18px 40px rgba(0,0,0,.35);
}

.note img{
width: 100%;
height: 180px;
object-fit: contain; /* Kept your preference to fit the whole image */
background: #fcfcfc; 
border-radius: 2px;
}

.message{
text-align:center;
margin-top:15px;
line-height:1.2;
}

.username{
font-size:20px;
margin-bottom:6px;
}

.post-box{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 8px 30px rgba(0,0,0,.2);
z-index:100;
display:flex;
gap:10px;
align-items:center;
}

textarea{
width:240px;
height:55px;
border:none;
background:#f6f6f6;
border-radius:8px;
padding:8px;
resize:none;
}

input[type="text"]{
padding:8px;
border:none;
border-radius:8px;
background:#f6f6f6;
width:160px;
}

button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#c89f7b;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header-container">
  <h1 class="title">Richa's Birthday Wall ✨</h1>
  
  <div class="countdown-container">
    <div class="countdown-item">
      <span class="countdown-number" id="days">00</span>
      <span class="countdown-label">Days</span>
    </div>
    <div class="countdown-item">
      <span class="countdown-number" id="hours">00</span>
      <span class="countdown-label">Hours</span>
    </div>
    <div class="countdown-item">
      <span class="countdown-number" id="minutes">00</span>
      <span class="countdown-label">Mins</span>
    </div>
    <div class="countdown-item">
      <span class="countdown-number" id="seconds">00</span>
      <span class="countdown-label">Secs</span>
    </div>
  </div>
</div>

<div id="wall"></div>

<div class="post-box">
<input id="username" type="text" placeholder="Your name ❤️">
<textarea id="message" placeholder="Leave a memory..."></textarea>
<input type="file" id="imageInput">
<button onclick="addPost()">Pin Memory</button>
</div>

<script>

/* ================= FIREBASE INIT ================= */

const firebaseConfig = {
  apiKey: "AIzaSyC6SCVxBj8e1erraHSZYNIbUQ9rd_ZIVqE",
  authDomain: "birthdaywall-5c717.firebaseapp.com",
  projectId: "birthdaywall-5c717",
  storageBucket: "birthdaywall-5c717.firebasestorage.app",
  messagingSenderId: "690240797364",
  appId: "1:690240797364:web:e6863fa5ac7bcecaac75e1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ===== WALL SYSTEM ===== */

const fonts=[
"Caveat",
"Indie Flower",
"Patrick Hand",
"Shadows Into Light",
"Gloria Hallelujah"
];

const inkColors=[
"#1f2937","#1e3a8a","#14532d","#7f1d1d","#312e81","#3f3f46"
];

const paperColors=[
"#fffdfa","#fef9f3","#fff7ed","#fafaf9","#f8fafc"
];

let placed=[];

function overlaps(x,y){
for(let p of placed){
if(Math.abs(p.x-x)<260 && Math.abs(p.y-y)<260)return true;
}
return false;
}

function randomPosition(){
let x,y,tries=0;
do{
x=Math.random()*(window.innerWidth-260);
y=Math.random()*2000+50;
tries++;
if(tries>100)break;
}while(overlaps(x,y));

placed.push({x,y});
return{x,y};
}

  /* ===== AESTHETIC COUNTDOWN TIMER ===== */

// Set target date to May 24, 2026 00:00:00
const targetDate = new Date("May 24, 2026 00:00:00").getTime();

const countdownInterval = setInterval(function() {
  const now = new Date().getTime();
  const difference = targetDate - now;

  // Time calculations for days, hours, minutes, and seconds
  const days = Math.floor(difference / (1000 * 60 * 60 * 24));
  const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((difference % (1000 * 60)) / 1000);

  // If the countdown is running, display values
  if (difference > 0) {
    document.getElementById("days").innerText = days.toString().padStart(2, '0');
    document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
    document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
    document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
  } else {
    // What happens when the countdown hits zero
    clearInterval(countdownInterval);
    document.querySelector(".countdown-container").innerHTML = `
      <div class="countdown-number" style="font-size: 24px; padding: 5px 15px;">
        🎉 Happy Birthday, Richa! 🎂
      </div>
    `;
  }
}, 1000);

function createNote(text,imageURL){

const note=document.createElement("div");
note.className="note"; // Removed 'firebase-note' tag from initial photos to keep them permanent

const rotate=(Math.random()*12)-6;
note.style.transform=`rotate(${rotate}deg)`;

note.style.fontFamily=
fonts[Math.floor(Math.random()*fonts.length)];

note.style.background=
paperColors[Math.floor(Math.random()*paperColors.length)];

const pos=randomPosition();
note.style.left=pos.x+"px";
note.style.top=pos.y+"px";

const size=18+Math.random()*8;
const color=inkColors[Math.floor(Math.random()*inkColors.length)];

const content=`
<div class="message" style="font-size:${size}px;color:${color};">
${text}
</div>
`;

note.innerHTML=imageURL
? `<img src="${imageURL}">${content}`
: content;

document.getElementById("wall").appendChild(note);
}

// Separate function for rendering firebase-specific notes so we can safely wipe them on snapshot reload
function createFirebaseNote(text,imageURL){
  const note=document.createElement("div");
  note.className="note firebase-note"; // Uses firebase-note class here so they can be cleaned on updates

  const rotate=(Math.random()*12)-6;
  note.style.transform=`rotate(${rotate}deg)`;
  note.style.fontFamily=fonts[Math.floor(Math.random()*fonts.length)];
  note.style.background=paperColors[Math.floor(Math.random()*paperColors.length)];

  const pos=randomPosition();
  note.style.left=pos.x+"px";
  note.style.top=pos.y+"px";

  const size=18+Math.random()*8;
  const color=inkColors[Math.floor(Math.random()*inkColors.length)];

  const content=`
  <div class="message" style="font-size:${size}px;color:${color};">
  ${text}
  </div>
  `;

  note.innerHTML=imageURL ? `<img src="${imageURL}">${content}` : content;
  document.getElementById("wall").appendChild(note);
}

/* ===== ADD POST ===== */

async function addPost(){
const name=document.getElementById("username").value||"Someone";
const msg=document.getElementById("message").value;
const file=document.getElementById("imageInput").files[0];

if(!msg && !file) return;

let imageURL=null;

if(file){
imageURL=await new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(file);
});
}

// Saves straight to database with approved set to false
await db.collection("messages").add({
name:name,
message:msg,
image:imageURL,
approved:false,
timestamp:Date.now()
});

alert("✨ Your memory has been sent for approval!");

document.getElementById("username").value="";
document.getElementById("message").value="";
document.getElementById("imageInput").value="";
}

/* ===== INITIAL PHOTOS ===== */

const initialPhotos=[
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-01-14-13-49-01_alcwm6.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-34-13_dypg9e.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-46-33_s6tsra.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-10-14-14-46-27_sigzy1.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2026-05-10-01-45-09_o8tdaa.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-05-25-00-15-51_oba8u3.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-09-20-20-40-37_rcdxaq.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2024-07-28-19-48-58_aosx29.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-12-12-15-34_qnjgz7.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-12-24-19-56-07_me8bhs.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-04-20-37-44_dvytnh.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-06-02-21-20-49_wcim7q.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-04-09-08-08-36_bth7fs.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-06-06-11-54-13_eho77m.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2023-12-10-15-41-11_zysraq.jpg"
];

const birthdayMessages = [
    "🎉 Happy Birthday Richa! May your smile stay forever ❤️",
    "🥳 Another year prettier, wiser & more amazing!",
    "🎂 Officially upgraded to a new level of awesome!",
    "✨ You make life brighter just by existing.",
    "😂 Warning: Cake calories don’t count today!",
    "🌸 Stay magical, stay beautiful, stay YOU.",
    "💖 Today the world celebrates its favorite person!",
    "🎈 Born to shine, destined to slay!",
    "🍰 Eat cake. Repeat. It’s your birthday.",
    "❤️ You deserve happiness multiplied by infinity.",
    "🎊 May your day be full of surprises & laughter!",
    "🌟 Still younger than you’ll be next year 😄",
    "🎁 Happiness looks good on you!",
    "💫 Keep glowing like the star you are.",
    "🥰 Life feels better because you’re in it.",
    "🎉 Happy Birthday Queen! Rule your day 👑"
];

initialPhotos.forEach((url, index) => {
    createNote(birthdayMessages[index], url);
});

/* ===== LOAD APPROVED POSTS ===== */

db.collection("messages")
.where("approved","==",true)
.orderBy("timestamp","asc")
.onSnapshot(snapshot=>{

// Wipe out only dynamically loaded database notes to avoid duplicate overlaps
document.querySelectorAll(".firebase-note")
.forEach(n=>n.remove());

// Reset placement coordinates tracking array back to initial hardcoded photos layout size
placed = placed.slice(0, initialPhotos.length);

snapshot.forEach(doc=>{
const data=doc.data();

const finalText=`
<div class="username"><b>${data.name}</b> said —</div>
${data.message}
`;

createFirebaseNote(finalText,data.image);
});
});

</script>
</body>
</html>
