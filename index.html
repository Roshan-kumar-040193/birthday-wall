<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Wall 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&family=Patrick+Hand&family=Indie+Flower&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:transparent;
font-family:sans-serif;
overflow-x:hidden;
}

/* ===== ROPE ===== */

.rope{
position:fixed;
top:40px;
left:0;
width:100%;
height:2px;
background:black;
z-index:5;
}

.hanging{
position:fixed;
top:42px;
display:flex;
gap:30px;
width:100%;
justify-content:center;
z-index:6;
}

.hanging img{
height:120px;
transform:rotate(-3deg);
box-shadow:0 6px 12px rgba(0,0,0,.3);
}

/* ===== WALL ===== */

.wall{
position:relative;
width:100%;
height:3000px;
}

/* ===== POLAROID ===== */

.polaroid{
position:absolute;
width:220px;
background:white;
padding:10px;
padding-bottom:40px;
box-shadow:0 10px 20px rgba(0,0,0,.25);
border-radius:4px;
transition:.3s;
}

.polaroid:hover{
transform:scale(1.08);
z-index:10;
}

.polaroid img{
width:100%;
}

.note{
margin-top:8px;
font-size:20px;
white-space:pre-line;
}

/* ===== MESSAGE BOX ===== */

.formBox{
position:fixed;
top:120px;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
z-index:10;
border-radius:10px;
}

input,textarea{
width:250px;
margin-top:10px;
padding:8px;
}

button{
margin-top:10px;
padding:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="rope"></div>

<div class="hanging">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
</div>

<div class="formBox">
<h3>Leave a Birthday Message 🎂</h3>

<input id="name" placeholder="Your Name">
<br>
<textarea id="message" placeholder="Write something beautiful..."></textarea>
<br>
<button onclick="submitMessage()">Send ❤️</button>

<p id="status"></p>

</div>

<div class="wall" id="wall"></div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

/* ===== PASTE YOUR FIREBASE CONFIG HERE ===== */

const firebaseConfig = {
 apiKey: "PASTE",
 authDomain: "PASTE",
 projectId: "PASTE",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ===== RANDOM STYLE HELPERS ===== */

const fonts = [
"Caveat",
"Patrick Hand",
"Indie Flower"
];

function random(min,max){
return Math.random()*(max-min)+min;
}

/* ===== CREATE POLAROID ===== */

function createPolaroid(data){

const wall = document.getElementById("wall");

const div = document.createElement("div");
div.className="polaroid";

div.style.top=random(200,2800)+"px";
div.style.left=random(5,80)+"%";
div.style.transform=`rotate(${random(-12,12)}deg)`;

div.innerHTML=`
<div class="note"
style="font-family:${fonts[Math.floor(Math.random()*fonts.length)]}">
<b>${data.name} said —</b>
${data.message}
</div>
`;

wall.appendChild(div);
}

/* ===== LOAD APPROVED MESSAGES ===== */

db.collection("messages")
.where("approved","==",true)
.orderBy("timestamp","asc")
.onSnapshot(snapshot=>{
document.getElementById("wall").innerHTML="";
snapshot.forEach(doc=>{
createPolaroid(doc.data());
});
});

/* ===== SUBMIT MESSAGE ===== */

function submitMessage(){

const name=document.getElementById("name").value.trim();
const message=document.getElementById("message").value.trim();

if(!name || !message){
alert("Fill everything ❤️");
return;
}

db.collection("messages").add({
name,
message,
approved:false,
timestamp:Date.now()
});

document.getElementById("status").innerText=
"✨ Message sent! Waiting for approval.";

document.getElementById("name").value="";
document.getElementById("message").value="";
}

</script>

</body>
</html>
