<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Richa ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ---------- BACKGROUND ---------- */

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f4efe8;
background-image:
url("https://www.transparenttextures.com/patterns/paper-fibers.png");
color:#3c3c3c;
overflow-x:hidden;
}

/* ---------- MAIN LAYOUT ---------- */

.container{
display:flex;
justify-content:space-between;
padding:40px;
}

/* ---------- CENTER SECTION ---------- */

.center{
width:40%;
text-align:center;
margin:auto;
}

h1{
font-family:'Playfair Display',serif;
font-size:52px;
margin-bottom:5px;
}

.subtitle{
opacity:.6;
margin-bottom:30px;
}

#countdown{
font-size:18px;
margin-bottom:40px;
}

/* ---------- MESSAGE CARD ---------- */

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
}

textarea{
width:100%;
height:90px;
border:none;
background:#f6f6f6;
border-radius:12px;
padding:10px;
font-size:15px;
}

button{
margin-top:12px;
padding:10px 22px;
border:none;
border-radius:20px;
background:#c89f7b;
color:white;
cursor:pointer;
}

.post{
background:#fafafa;
padding:12px;
margin-top:10px;
border-radius:10px;
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* ---------- POLAROID WALL ---------- */

.wall{
width:30%;
position:relative;
}

/* THREAD */
.wall::before{
content:"";
position:absolute;
top:40px;
left:0;
right:0;
height:2px;
background:#c7b8a6;
}

/* POLAROID */
.polaroid{
width:160px;
background:white;
padding:10px;
box-shadow:0 6px 20px rgba(0,0,0,.2);
position:absolute;
transition:.4s;
}

.polaroid img{
width:100%;
height:160px;
object-fit:cover;
}

.polaroid:hover{
transform:scale(1.08) rotate(0deg);
z-index:5;
}

/* RANDOM POSITIONS */

.p1{top:60px; left:20px; transform:rotate(-6deg);}
.p2{top:200px; left:120px; transform:rotate(5deg);}
.p3{top:350px; left:40px; transform:rotate(-4deg);}
.p4{top:500px; left:140px; transform:rotate(6deg);}
.p5{top:650px; left:60px; transform:rotate(-3deg);}

.right .p1{left:auto; right:20px;}
.right .p2{left:auto; right:120px;}
.right .p3{left:auto; right:40px;}
.right .p4{left:auto; right:140px;}
.right .p5{left:auto; right:60px;}

footer{
text-align:center;
opacity:.5;
margin:40px;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT WALL -->
<div class="wall left">
<div class="polaroid p1"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-01-14-13-49-01_alcwm6.jpg"></div>
<div class="polaroid p2"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-34-13_dypg9e.jpg"></div>
<div class="polaroid p3"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-46-33_s6tsra.jpg"></div>
<div class="polaroid p4"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-10-14-14-46-27_sigzy1.jpg"></div>
<div class="polaroid p5"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2026-05-10-01-45-09_o8tdaa.jpg"></div>
<div class="polaroid p6"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-05-25-00-15-51_oba8u3.jpg"></div>
<div class="polaroid p7"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-09-20-20-40-37_rcdxaq.jpg"></div>

</div>


<!-- CENTER -->
<div class="center">

<h1>Richa</h1>
<div class="subtitle">a day worth celebrating ✨</div>

<div id="countdown"></div>

<div class="card">
<h3>Birthday Wall</h3>

<textarea id="message" placeholder="Leave a memory..."></textarea>
<button onclick="addPost()">Post</button>

<div id="timeline"></div>
</div>

</div>


<!-- RIGHT WALL -->
<div class="wall right">

<div class="polaroid p1"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2024-07-28-19-48-58_aosx29.jpg"></div>
<div class="polaroid p2"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-12-12-15-34_qnjgz7.jpg"></div>
<div class="polaroid p3"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-12-24-19-56-07_me8bhs.jpg"></div>
<div class="polaroid p4"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-04-20-37-44_dvytnh.jpg"></div>
<div class="polaroid p5"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-06-02-21-20-49_wcim7q.jpg"></div>
<div class="polaroid p6"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-04-09-08-08-36_bth7fs.jpg"></div>
<div class="polaroid p7"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-06-06-11-54-13_eho77m.jpg"></div>
<div class="polaroid p8"><img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2023-12-10-15-41-11_zysraq.jpg"></div>


</div>

</div>

<footer>made with love</footer>

<script>

/* COUNTDOWN */

const birthday=new Date("May 24, 2026 00:00:00");

setInterval(()=>{
const now=new Date();
const diff=birthday-now;

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff/(1000*60*60))%24);
const m=Math.floor((diff/(1000*60))%60);
const s=Math.floor((diff/1000)%60);

document.getElementById("countdown").innerText=
`${d}d ${h}h ${m}m ${s}s`;

},1000);


/* POSTS */

function addPost(){
const text=document.getElementById("message").value;
if(!text)return;

const post=document.createElement("div");
post.className="post";
post.innerText=text;

document.getElementById("timeline").prepend(post);
document.getElementById("message").value="";
}


/* 🎵 AUTO HAPPY BIRTHDAY */

const today=new Date();

if(today.getDate()==24 && today.getMonth()==4){
const audio=new Audio(
"https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.wav"
);
audio.play();
}

</script>

</body>
</html>
