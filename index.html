<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Richa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:'Inter',sans-serif;
background:#F5EFE6;
color:#2B2B2B;
}

/* BOHO TEXTURE BACKGROUND */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/cream-paper.png");
opacity:.4;
z-index:-1;
}

/* HERO */

.hero{
padding:80px 20px 40px;
text-align:center;
}

h1{
font-family:'Playfair Display',serif;
font-size:56px;
letter-spacing:2px;
margin-bottom:10px;
}

.subtitle{
color:#8B5E3C;
font-size:18px;
}

#countdown{
margin-top:15px;
font-size:22px;
}

/* SECTION */

.section{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

/* CAROUSEL */

.carousel{
position:relative;
overflow:hidden;
border-radius:16px;
}

.slides{
display:flex;
transition:transform 1s ease;
}

.slides img{
width:100%;
height:520px;
object-fit:cover;
}

/* DOTS */

.dots{
text-align:center;
margin-top:10px;
}

.dot{
height:8px;
width:8px;
margin:5px;
display:inline-block;
background:#C97C5D;
border-radius:50%;
opacity:.4;
}

.active{
opacity:1;
}

/* MESSAGE WALL */

.wall{
background:#FAF7F2;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

textarea{
width:100%;
height:90px;
border:none;
background:#fff;
padding:12px;
border-radius:10px;
font-size:15px;
}

button{
margin-top:12px;
padding:10px 22px;
border:none;
background:#C97C5D;
color:white;
border-radius:30px;
cursor:pointer;
}

.post{
background:white;
padding:15px;
margin-top:15px;
border-radius:12px;
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px);}
}

/* FOOTER */

footer{
text-align:center;
padding:50px;
color:#8B5E3C;
font-size:14px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>Richa</h1>
<div class="subtitle">a day worth celebrating ✨</div>
<div id="countdown"></div>
</div>

<!-- CAROUSEL -->
<div class="section">

<div class="carousel">
<div class="slides" id="slides">

<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-01-14-13-49-01_alcwm6.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-34-13_dypg9e.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-46-33_s6tsra.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-10-14-14-46-27_sigzy1.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2026-05-10-01-45-09_o8tdaa.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-05-25-00-15-51_oba8u3.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-09-20-20-40-37_rcdxaq.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2024-07-28-19-48-58_aosx29.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-12-12-15-34_qnjgz7.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-12-24-19-56-07_me8bhs.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-04-20-37-44_dvytnh.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-06-02-21-20-49_wcim7q.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-04-09-08-08-36_bth7fs.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-06-06-11-54-13_eho77m.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2023-12-10-15-41-11_zysraq.jpg">

</div>
</div>

<div class="dots" id="dots"></div>

</div>

<!-- WALL -->
<div class="section">

<div class="wall">

<h2>Birthday Wall</h2>

<textarea id="message" placeholder="Leave a memory..."></textarea>
<button onclick="addPost()">Post</button>

<div id="timeline"></div>

</div>

</div>

<footer>
made with love
</footer>

<!-- AUDIO -->
<audio id="birthdayMusic" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c3b92b62e.mp3"></audio>

<script>

/* COUNTDOWN */

const birthday=new Date("May 24, 2026 00:00:00");

setInterval(()=>{
const now=new Date();
const diff=birthday-now;

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff/(1000*60*60))%24);
const m=Math.floor((diff/(1000*60))%60);
const s=Math.floor((diff/1000)%60);

document.getElementById("countdown").innerText=
`${d} days ${h} hrs ${m} mins ${s} sec`;
},1000);


/* PLAY MUSIC ON MAY 24 */

const today=new Date();

if(today.getDate()==24 && today.getMonth()==4){
document.getElementById("birthdayMusic").play();
}


/* CAROUSEL */

let index=0;
const slides=document.getElementById("slides");
const dotsContainer=document.getElementById("dots");

const total=slides.children.length;

for(let i=0;i<total;i++){
const dot=document.createElement("span");
dot.className="dot";
dotsContainer.appendChild(dot);
}

const dots=document.querySelectorAll(".dot");

function showSlide(){
slides.style.transform=`translateX(-${index*100}%)`;

dots.forEach(d=>d.classList.remove("active"));
dots[index].classList.add("active");
}

setInterval(()=>{
index=(index+1)%total;
showSlide();
},5000);

showSlide();


/* POSTS */

function addPost(){
const text=document.getElementById("message").value;
if(!text)return;

const post=document.createElement("div");
post.className="post";
post.innerText=text;

document.getElementById("timeline").prepend(post);
document.getElementById("message").value="";
}

</script>

</body>
</html>
