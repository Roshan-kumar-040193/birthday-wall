<!DOCTYPE html>
<html>
<head>
<title>Richa's Birthday Wall ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Caveat&family=Indie+Flower&family=Patrick+Hand&family=Shadows+Into+Light&display=swap" rel="stylesheet">

<style>

/* ---------- PAGE ---------- */

body{
margin:0;
background:#f3efe8;
font-family:sans-serif;
overflow-x:hidden;
}

.title{
text-align:center;
font-family:'Playfair Display';
margin:40px 0;
font-size:48px;
}

/* ---------- HANGING ROPE ---------- */

.rope{
position:relative;
width:100%;
height:220px;
margin-bottom:40px;
}

/* rope line */
.rope::before{
content:"";
position:absolute;
top:60px;
left:0;
right:0;
height:3px;
background:#bda98f;
}

/* hanging photos */

.hanging{
position:absolute;
top:70px;
width:150px;
background:white;
padding:8px;
box-shadow:0 6px 20px rgba(0,0,0,.25);
transition:.3s;
}

.hanging img{
width:100%;
height:140px;
object-fit:cover;
}

.hanging:hover{
transform:scale(1.08) rotate(0deg);
z-index:10;
}

/* random rotations */
.h1{left:5%; transform:rotate(-6deg);}
.h2{left:20%; transform:rotate(5deg);}
.h3{left:35%; transform:rotate(-4deg);}
.h4{left:50%; transform:rotate(6deg);}
.h5{left:65%; transform:rotate(-3deg);}
.h6{left:80%; transform:rotate(4deg);}

/* ---------- WALL ---------- */

#wall{
position:relative;
width:100%;
min-height:3000px;
}

/* polaroid notes */

.note{
position:absolute;
width:230px;
background:white;
padding:10px 10px 40px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
border-radius:4px;
transition:.3s;
}

.note:hover{
transform:scale(1.05) rotate(0deg);
z-index:10;
}

.note img{
width:100%;
height:180px;
object-fit:cover;
}

.note p{
margin-top:10px;
text-align:center;
}

/* ---------- POST BOX ---------- */

.post-box{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

textarea{
width:260px;
height:60px;
border-radius:8px;
border:none;
background:#f6f6f6;
padding:8px;
}

button{
margin-top:10px;
padding:8px 20px;
border:none;
border-radius:20px;
background:#c89f7b;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<!-- ================= WALL ================= -->

<div id="wall"></div>

<!-- ================= POST BOX ================= -->

<div class="post-box">
<textarea id="message" placeholder="Leave a memory..."></textarea>
<input type="file" id="imageInput">
<button onclick="addPost()">Pin Memory</button>
</div>

<script>

/* handwritten fonts */

const fonts=[
"Caveat",
"Indie Flower",
"Patrick Hand",
"Shadows Into Light"
];

let placedPositions=[];

/* prevent overlap */

function isOverlapping(x,y){

for(let pos of placedPositions){

if(
Math.abs(pos.x-x)<260 &&
Math.abs(pos.y-y)<260
){
return true;
}
}
return false;
}

function getPosition(){

let x,y;

do{
x=Math.random()*(window.innerWidth-260);
y=Math.random()*2500+200;
}
while(isOverlapping(x,y));

placedPositions.push({x,y});

return {x,y};
}

/* create polaroid */

function createNote(text,imageURL){

const note=document.createElement("div");
note.className="note";

const rotate=(Math.random()*12)-6;
note.style.transform=`rotate(${rotate}deg)`;

note.style.fontFamily=
fonts[Math.floor(Math.random()*fonts.length)];

const pos=getPosition();
note.style.left=pos.x+"px";
note.style.top=pos.y+"px";

if(imageURL){
note.innerHTML=`
<img src="${imageURL}">
<p>${text}</p>
`;
}else{
note.innerHTML=`<p>${text}</p>`;
}

document.getElementById("wall").appendChild(note);
}

/* add post */

function addPost(){

const text=document.getElementById("message").value;
const file=document.getElementById("imageInput").files[0];

if(!text && !file) return;

if(file){

const reader=new FileReader();

reader.onload=function(e){
createNote(text,e.target.result);
};

reader.readAsDataURL(file);

}else{
createNote(text,null);
}

document.getElementById("message").value="";
}

</script>
