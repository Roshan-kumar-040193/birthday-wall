<!DOCTYPE html>
<html>
<head>
<title>Richa's Birthday Wall ✨</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Caveat&family=Indie+Flower&family=Patrick+Hand&family=Shadows+Into+Light&family=Gloria+Hallelujah&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#f3efe8;
overflow-x:hidden;
}

/* Header Container to hold title and countdown */
.header-container {
text-align: center;
margin: 40px 0 20px 0;
padding: 0 15px;
}

.title{
font-family:'Playfair Display', serif;
font-size:48px;
margin: 0 0 15px 0;
color: #2c2c2c;
letter-spacing: -0.5px;
}

@media (max-width: 600px) {
  .title {
    font-size: 32px;
  }
}

/* Aesthetic Countdown Styles */
.countdown-container {
display: inline-flex;
gap: 20px;
font-family: 'Patrick Hand', cursive;
background: rgba(255, 255, 255, 0.65);
padding: 12px 28px;
border-radius: 30px;
box-shadow: 0 8px 24px rgba(0,0,0,0.04);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
border: 1px solid rgba(255, 255, 255, 0.4);
}

@media (max-width: 480px) {
  .countdown-container {
    gap: 12px;
    padding: 8px 16px;
  }
}

.countdown-item {
display: flex;
flex-direction: column;
align-items: center;
min-width: 50px;
}

@media (max-width: 480px) {
  .countdown-item {
    min-width: 40px;
  }
}

.countdown-number {
font-size: 30px;
font-weight: bold;
color: #c89f7b;
line-height: 1;
}

@media (max-width: 480px) {
  .countdown-number {
    font-size: 22px;
  }
}

.countdown-label {
font-size: 13px;
color: #71717a;
text-transform: uppercase;
letter-spacing: 1px;
margin-top: 4px;
}

@media (max-width: 480px) {
  .countdown-label {
    font-size: 10px;
  }
}

/* --- WALL LAYOUT DESKTOP --- */
#wall{
position:relative;
width:100%;
min-height: 2200px; 
}

/* --- WALL LAYOUT MOBILE: No overlap masonry layout --- */
@media (max-width: 768px) {
  #wall {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)) !important;
    gap: 20px !important;
    padding: 30px 16px 180px 16px !important;
    box-sizing: border-box !important;
    min-height: auto !important; 
  }
}

.note{
position:absolute;
width:240px;
padding:12px 12px 30px;
background:white;
box-shadow:0 8px 20px rgba(0,0,0,.12);
border-radius:2px;
transition: transform .4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow .4s ease;
will-change: transform;
box-sizing: border-box;
}

/* Remove CSS absolute positioning vectors safely inside mobile grid viewports */
@media (max-width: 768px) {
  .note {
    position: relative !important;
    left: auto !important;
    top: auto !important;
    width: 100% !important;
    margin: 0 !important;
    padding: 10px 10px 20px !important;
  }
}

.note:hover{
transform:scale(1.06) rotate(0deg)!important;
z-index:10;
box-shadow:0 20px 38px rgba(0,0,0,.24);
}

.note img{
width: 100%;
height: 180px;
object-fit: contain;
background: radial-gradient(#fdfdfd, #fafafa);
border-radius: 1px;
display: block;
}

@media (max-width: 768px) {
  .note img {
    height: 150px;
  }
}

.message{
text-align:center;
margin-top:14px;
line-height:1.3;
padding: 0 4px;
word-wrap: break-word;
}

.username{
font-size:18px;
margin-bottom:6px;
opacity: 0.9;
}

/* Responsive Sticky Form Pin-Box Container */
.post-box{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
background: rgba(255, 255, 255, 0.95);
padding:12px 18px;
border-radius:20px;
box-shadow: 0 12px 40px rgba(0,0,0,0.16);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.5);
z-index:100;
display:flex;
gap:12px;
align-items:center;
max-width: 90%;
box-sizing: border-box;
}

/* Turns panel vertical on mobile screens to save space */
@media (max-width: 768px) {
  .post-box {
    flex-direction: column;
    width: 90%;
    bottom: 12px;
    padding: 14px;
    gap: 8px;
  }
}

textarea{
width:240px;
height:44px;
border:1px solid rgba(0,0,0,0.05);
background: rgba(246, 246, 246, 0.7);
border-radius:10px;
padding:10px;
resize:none;
font-family: inherit;
font-size: 14px;
outline: none;
transition: background 0.2s;
}

@media (max-width: 768px) {
  textarea {
    width: 100%;
    height: 50px;
  }
}

input[type="text"]{
padding:10px;
border:1px solid rgba(0,0,0,0.05);
border-radius:10px;
background: rgba(246, 246, 246, 0.7);
width:140px;
font-family: inherit;
font-size: 14px;
outline: none;
transition: background 0.2s;
}

@media (max-width: 768px) {
  input[type="text"] {
    width: 100%;
  }
}

/* Custom File Upload Styling wrapper */
.file-upload-wrapper {
position: relative;
display: inline-block;
cursor: pointer;
}

@media (max-width: 768px) {
  .file-upload-wrapper {
    width: 100%;
  }
}

.file-upload-label {
display: flex;
align-items: center;
justify-content: center;
background: rgba(246, 246, 246, 0.7);
border: 1px solid rgba(0,0,0,0.05);
padding: 10px 14px;
border-radius: 10px;
font-size: 14px;
font-weight: 500;
color: #555;
transition: all 0.2s;
}

@media (max-width: 768px) {
  .file-upload-label {
    padding: 12px;
  }
}

.file-upload-wrapper:hover .file-upload-label {
background: #ffffff;
border-color: rgba(200, 159, 123, 0.3);
}

.file-upload-wrapper input[type="file"] {
position: absolute;
left: 0;
top: 0;
opacity: 0;
width: 100%;
height: 100%;
cursor: pointer;
}

button{
padding:11px 22px;
border:none;
border-radius:12px;
background:#c89f7b;
color:white;
font-size: 14px;
font-weight:600;
cursor:pointer;
transition: background 0.2s, transform 0.1s;
box-shadow: 0 4px 12px rgba(200, 159, 123, 0.2);
}

@media (max-width: 768px) {
  button {
    width: 100%;
    padding: 12px;
  }
}

button:hover {
background: #b88f6b;
transform: translateY(-1px);
}

button:active {
transform: translateY(0);
}
</style>
</head>

<body>

<div class="header-container">
  <h1 class="title">Richa's Birthday Wall ✨</h1>
  
  <div class="countdown-container">
    <div class="countdown-item">
      <span class="countdown-number" id="days">00</span>
      <span class="countdown-label">Days</span>
    </div>
    <div class="countdown-item">
      <span class="countdown-number" id="hours">00</span>
      <span class="countdown-label">Hours</span>
    </div>
    <div class="countdown-item">
      <span class="countdown-number" id="minutes">00</span>
      <span class="countdown-label">Mins</span>
    </div>
    <div class="countdown-item">
      <span class="countdown-number" id="seconds">00</span>
      <span class="countdown-label">Secs</span>
    </div>
  </div>
</div>

<div id="wall"></div>

<div class="post-box">
  <input id="username" type="text" placeholder="Your name ❤️">
  <textarea id="message" placeholder="Leave a memory..."></textarea>
  
  <div class="file-upload-wrapper">
    <div class="file-upload-label" id="uploadLabel">📸 Photo</div>
    <input type="file" id="imageInput" onchange="updateFileName(this)">
  </div>
  
  <button onclick="addPost()">Pin Memory</button>
</div>

<script>

/* ================= FIREBASE INIT ================= */

const firebaseConfig = {
  apiKey: "AIzaSyC6SCVxBj8e1erraHSZYNIbUQ9rd_ZIVqE",
  authDomain: "birthdaywall-5c717.firebaseapp.com",
  projectId: "birthdaywall-5c717",
  storageBucket: "birthdaywall-5c717.firebasestorage.app",
  messagingSenderId: "690240797364",
  appId: "1:690240797364:web:e6863fa5ac7bcecaac75e1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ===== WALL SYSTEM ===== */

const fonts=[
"Caveat",
"Indie Flower",
"Patrick Hand",
"Shadows Into Light",
"Gloria Hallelujah"
];

const inkColors=[
"#1f2937","#1e3a8a","#14532d","#7f1d1d","#312e81","#3f3f46"
];

const paperColors=[
"#fffdfa","#fef9f3","#fff7ed","#fafaf9","#f8fafc"
];

let placed=[];

function overlaps(x, y) {
  // Desktop spacing constraints (250px buffer zones)
  for (let p of placed) {
    if (Math.abs(p.x - x) < 250 && Math.abs(p.y - y) < 250) {
      return true;
    }
  }
  return false;
}

function randomPosition() {
  let x, y, tries = 0;
  // Always use standard desktop bounds here. CSS overrides layout coordinates on mobile automatically.
  const maxWidth = Math.max(window.innerWidth, 1200) - 260;

  do {
    x = Math.random() * (maxWidth - 40) + 20;
    y = Math.random() * 1800 + 40;
    tries++;
    if (tries > 400) break;
  } while (overlaps(x, y));

  placed.push({ x, y });
  return { x, y };
}

/* ===== AESTHETIC COUNTDOWN TIMER ===== */

const targetDate = new Date("May 24, 2026 00:00:00").getTime();

const countdownInterval = setInterval(function() {
  const now = new Date().getTime();
  const difference = targetDate - now;

  const days = Math.floor(difference / (1000 * 60 * 60 * 24));
  const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((difference % (1000 * 60)) / 1000);

  if (difference > 0) {
    document.getElementById("days").innerText = days.toString().padStart(2, '0');
    document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
    document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
    document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
  } else {
    clearInterval(countdownInterval);
    document.querySelector(".countdown-container").innerHTML = `
      <div class="countdown-number" style="font-size: 24px; padding: 5px 15px;">
        🎉 Happy Birthday, Richa! 🎂
      </div>
    `;
  }
}, 1000);

function updateFileName(input) {
  const label = document.getElementById("uploadLabel");
  if(input.files && input.files[0]) {
    label.innerText = "✅ Added";
    label.style.borderColor = "rgba(200, 159, 123, 0.4)";
  } else {
    label.innerText = "📸 Photo";
  }
}

function createNote(text,imageURL){
  const note=document.createElement("div");
  note.className="note";

  const rotate=(Math.random()*10)-5;
  note.style.transform=`rotate(${rotate}deg)`;
  note.style.fontFamily=fonts[Math.floor(Math.random()*fonts.length)];
  note.style.background=paperColors[Math.floor(Math.random()*paperColors.length)];

  // Generate coordinates safely. If screen is mobile size, CSS grid overrides these layout declarations.
  const pos=randomPosition();
  note.style.left=pos.x+"px";
  note.style.top=pos.y+"px";

  const size=18+Math.random()*4;
  const color=inkColors[Math.floor(Math.random()*inkColors.length)];

  const content=`
  <div class="message" style="font-size:${size}px;color:${color};">
  ${text}
  </div>
  `;

  note.innerHTML=imageURL ? `<img src="${imageURL}">${content}` : content;
  document.getElementById("wall").appendChild(note);
}

function createFirebaseNote(text,imageURL){
  const note=document.createElement("div");
  note.className="note firebase-note";

  const rotate=(Math.random()*10)-5;
  note.style.transform=`rotate(${rotate}deg)`;
  note.style.fontFamily=fonts[Math.floor(Math.random()*fonts.length)];
  note.style.background=paperColors[Math.floor(Math.random()*paperColors.length)];

  const pos=randomPosition();
  note.style.left=pos.x+"px";
  note.style.top=pos.y+"px";

  const size=18+Math.random()*4;
  const color=inkColors[Math.floor(Math.random()*inkColors.length)];

  const content=`
  <div class="message" style="font-size:${size}px;color:${color};">
  ${text}
  </div>
  `;

  note.innerHTML=imageURL ? `<img src="${imageURL}">${content}` : content;
  document.getElementById("wall").appendChild(note);
}

/* ===== ADD POST ===== */

async function addPost(){
const name=document.getElementById("username").value||"Someone";
const msg=document.getElementById("message").value;
const file=document.getElementById("imageInput").files[0];

if(!msg && !file) return;

let imageURL=null;

if(file){
imageURL=await new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(file);
});
}

await db.collection("messages").add({
name:name,
message:msg,
image:imageURL,
approved:false,
timestamp:Date.now()
});

alert("✨ Your memory has been sent for approval!");

document.getElementById("username").value="";
document.getElementById("message").value="";
document.getElementById("imageInput").value="";
document.getElementById("uploadLabel").innerText = "📸 Photo";
}

/* ===== INITIAL PHOTOS ===== */

const initialPhotos=[
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-01-14-13-49-01_alcwm6.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-34-13_dypg9e.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-46-33_s6tsra.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-10-14-14-46-27_sigzy1.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2026-05-10-01-45-09_o8tdaa.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-05-25-00-15-51_oba8u3.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-09-20-20-40-37_rcdxaq.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2024-07-28-19-48-58_aosx29.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-12-12-15-34_qnjgz7.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-12-24-19-56-07_me8bhs.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-04-20-37-44_dvytnh.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-06-02-21-20-49_wcim7q.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-04-09-08-08-36_bth7fs.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-06-06-11-54-13_eho77m.jpg",
"https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2023-12-10-15-41-11_zysraq.jpg"
];

const birthdayMessages = [
    "🎉 Happy Birthday Richa! May your smile stay forever ❤️",
    "🥳 Another year prettier, wiser & more amazing!",
    "🎂 Officially upgraded to a new level of awesome!",
    "✨ You make life brighter just by existing.",
    "😂 Warning: Cake calories don’t count today!",
    "🌸 Stay magical, stay beautiful, stay YOU.",
    "💖 Today the world celebrates its favorite person!",
    "🎈 Born to shine, destined to slay!",
    "🍰 Eat cake. Repeat. It’s your birthday.",
    "❤️ You deserve happiness multiplied by infinity.",
    "🎊 May your day be full of surprises & laughter!",
    "🌟 Still younger than you’ll be next year 😄",
    "🎁 Happiness looks good on you!",
    "💫 Keep glowing like the star you are.",
    "🥰 Life feels better because you’re in it.",
    "🎉 Happy Birthday Queen! Rule your day 👑"
];

initialPhotos.forEach((url, index) => {
    createNote(birthdayMessages[index], url);
});

/* ===== LOAD APPROVED POSTS ===== */

db.collection("messages")
.where("approved","==",true)
.orderBy("timestamp","asc")
.onSnapshot(snapshot=>{

document.querySelectorAll(".firebase-note")
.forEach(n=>n.remove());

placed = placed.slice(0, initialPhotos.length);

snapshot.forEach(doc=>{
const data=doc.data();

const finalText=`
<div class="username"><b>${data.name}</b> said —</div>
${data.message}
`;

createFirebaseNote(finalText,data.image);
});
});

</script>
</body>
</html>
