<!DOCTYPE html>
<html>
<head>
<title>Richa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:'Inter',sans-serif;
background:#F5EFE6;
color:#2b2b2b;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/cream-paper.png");
opacity:.4;
z-index:-2;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.2)),
url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
background-size:cover;
background-position:center;
color:white;
animation:zoom 20s infinite alternate;
}

@keyframes zoom{
from{background-size:100%;}
to{background-size:110%;}
}

.hero h1{
font-family:'Playfair Display';
font-size:72px;
letter-spacing:3px;
}

#countdown{
font-size:22px;
margin-top:15px;
}

/* SECTIONS */

.section{
max-width:1100px;
margin:auto;
padding:80px 20px;
opacity:0;
transform:translateY(40px);
transition:1s;
}

.section.show{
opacity:1;
transform:none;
}

/* MASONRY GALLERY */

.gallery{
column-count:3;
column-gap:15px;
}

.gallery img{
width:100%;
margin-bottom:15px;
border-radius:14px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.03);
}

/* MESSAGE WALL */

.wall{
background:#FAF7F2;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

textarea{
width:100%;
height:90px;
border:none;
padding:12px;
border-radius:10px;
}

button{
margin-top:12px;
padding:10px 22px;
border:none;
background:#C97C5D;
color:white;
border-radius:30px;
cursor:pointer;
}

/* POSTS */

.post{
background:white;
padding:15px;
margin-top:15px;
border-radius:12px;
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px);}
}

/* BIRTHDAY OVERLAY */

#birthdayOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#F5EFE6;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:2s;
z-index:10;
}

#birthdayOverlay.show{
opacity:1;
pointer-events:auto;
}

.overlayText{
font-family:'Playfair Display';
font-size:48px;
text-align:center;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>Richa</h1>
<div id="countdown"></div>
</div>

<!-- MEMORIES -->
<div class="section">
<h2>Memories</h2>

<div class="gallery">

<!-- ADD MANY PHOTOS -->
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-01-14-13-49-01_alcwm6.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-34-13_dypg9e.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-09-12-23-46-33_s6tsra.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2025-10-14-14-46-27_sigzy1.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137978/PHOTO-2026-05-10-01-45-09_o8tdaa.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-05-25-00-15-51_oba8u3.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2025-09-20-20-40-37_rcdxaq.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137977/PHOTO-2024-07-28-19-48-58_aosx29.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-12-12-15-34_qnjgz7.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-12-24-19-56-07_me8bhs.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2024-02-04-20-37-44_dvytnh.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137976/PHOTO-2023-06-02-21-20-49_wcim7q.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-04-09-08-08-36_bth7fs.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2022-06-06-11-54-13_eho77m.jpg">
<img src="https://res.cloudinary.com/df3feu0pt/image/upload/v1779137975/PHOTO-2023-12-10-15-41-11_zysraq.jpg">

</div>
</div>

<!-- WALL -->
<div class="section">
<div class="wall">

<h2>Birthday Wall</h2>

<textarea id="message" placeholder="Leave something beautiful..."></textarea>
<button onclick="addPost()">Post</button>

<div id="timeline"></div>

</div>
</div>

<!-- OVERLAY -->
<div id="birthdayOverlay">
<div class="overlayText">
Happy Birthday ❤️<br>
You make life beautiful.
</div>
</div>

<audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c3b92b62e.mp3"></audio>

<script>

/* COUNTDOWN */

const birthday=new Date("May 24, 2026 00:00:00");

setInterval(()=>{
const now=new Date();
const diff=birthday-now;

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff/(1000*60*60))%24);
const m=Math.floor((diff/(1000*60))%60);
const s=Math.floor((diff/1000)%60);

document.getElementById("countdown").innerText=
`${d}d ${h}h ${m}m ${s}s`;
},1000);


/* SCROLL REVEAL */

const sections=document.querySelectorAll(".section");

window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
const top=sec.getBoundingClientRect().top;
if(top<window.innerHeight-100){
sec.classList.add("show");
}
});
});


/* POSTS */

function addPost(){
const text=document.getElementById("message").value;
if(!text)return;

const post=document.createElement("div");
post.className="post";
post.innerText=text;

document.getElementById("timeline").prepend(post);
document.getElementById("message").value="";
}


/* BIRTHDAY MIDNIGHT EXPERIENCE */

const today=new Date();

if(today.getDate()==24 && today.getMonth()==4){

setTimeout(()=>{
document.getElementById("birthdayOverlay").classList.add("show");

const music=document.getElementById("music");
music.volume=0;
music.play();

let vol=0;
const fade=setInterval(()=>{
vol+=0.05;
music.volume=vol;
if(vol>=1)clearInterval(fade);
},200);

},2000);

}

</script>

</body>
</html>
