<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Richa 🎉</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align:center;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero{
  padding:60px 20px;
}

h1{
  font-size:48px;
  margin-bottom:10px;
}

#countdown{
  font-size:28px;
  font-weight:600;
}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  margin:30px auto;
  width:70%;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

/* TEXT AREA */
textarea{
  width:80%;
  height:80px;
  border:none;
  border-radius:12px;
  padding:10px;
  font-size:16px;
}

button{
  margin-top:10px;
  padding:10px 25px;
  border:none;
  border-radius:30px;
  background:#ff4081;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.1);
}

/* TIMELINE */
.post{
  background:white;
  color:black;
  padding:15px;
  margin:15px;
  border-radius:15px;
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

/* PHOTO CAROUSEL */
.carousel{
  position:relative;
  width:80%;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
}

.slides{
  display:flex;
  transition:transform 0.5s ease;
}

.slides img{
  width:100%;
  border-radius:20px;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.4);
  border:none;
  color:white;
  font-size:30px;
  padding:10px;
  cursor:pointer;
}

.left{left:10px;}
.right{right:10px;}

/* FLOATING HEARTS */
.heart{
  position:fixed;
  bottom:-20px;
  color:white;
  animation:float 6s linear infinite;
}

@keyframes float{
  to{
    transform:translateY(-110vh);
    opacity:0;
  }
}

</style>
</head>

<body>

<div class="hero">
<h1>🎂 Happy Birthday Richa 🎂</h1>
<div id="countdown"></div>
</div>

<!-- PHOTO CAROUSEL -->
<div class="card">
<h2>✨ Our Memories ✨</h2>

<div class="carousel">
<button class="arrow left" onclick="prev()">❮</button>

<div class="slides" id="slides">

<!-- ADD HER PHOTOS HERE -->
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">

</div>

<button class="arrow right" onclick="next()">❯</button>
</div>
</div>

<!-- MESSAGE WALL -->
<div class="card">
<h2>💌 Birthday Wall</h2>

<textarea id="message" placeholder="Write something special..."></textarea>
<br>
<button onclick="addPost()">Post</button>

<div id="timeline"></div>
</div>

<script>

/* COUNTDOWN */
const birthday=new Date("May 24, 2026 00:00:00");

setInterval(()=>{
const now=new Date();
const diff=birthday-now;

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff/(1000*60*60))%24);
const m=Math.floor((diff/(1000*60))%60);
const s=Math.floor((diff/1000)%60);

document.getElementById("countdown").innerText=
`${d}d ${h}h ${m}m ${s}s left ❤️`;
},1000);


/* POSTS */
function addPost(){
const text=document.getElementById("message").value;
if(!text)return;

const post=document.createElement("div");
post.className="post";
post.innerText=text;

document.getElementById("timeline").prepend(post);
document.getElementById("message").value="";
}


/* CAROUSEL */
let index=0;
const slides=document.getElementById("slides");

function showSlide(){
slides.style.transform=`translateX(-${index*100}%)`;
}

function next(){
index++;
if(index>=slides.children.length)index=0;
showSlide();
}

function prev(){
index--;
if(index<0)index=slides.children.length-1;
showSlide();
}

/* AUTO SLIDE */
setInterval(next,4000);


/* FLOATING HEARTS */
setInterval(()=>{
const heart=document.createElement("div");
heart.className="heart";
heart.innerText="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
},600);

</script>

</body>
</html>
